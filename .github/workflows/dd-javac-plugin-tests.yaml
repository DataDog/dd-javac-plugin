name: Run dd-javac-plugin tests

on:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - '*'
  workflow_dispatch:

jobs:
  validate-wrapper:
    name: validate-gradle-wrapper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: gradle/actions/wrapper-validation@ed408507eac070d1f99cc633dbcf757c94c7933a # v4.4.3

  run-tests-jdk-8:
    name: run-unit-tests-jdk-8
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up JDK
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          java-version: |
            8
            11
          distribution: "adopt"
      - name: run-unit-tests
        run: ./gradlew test -PtestJdkVersion=8

  run-tests-jdk-11:
    name: run-unit-tests-jdk-11
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up JDK
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          java-version: |
            8
            11
          distribution: "adopt"
      - name: run-unit-tests
        run: ./gradlew test -PtestJdkVersion=11

  run-tests-jdk-17:
    name: run-unit-tests-jdk-17
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up JDK
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          java-version: |
            8
            11
            17
          distribution: "adopt"
      - name: run-unit-tests
        run: ./gradlew test -PtestJdkVersion=17

  run-tests-jdk-21:
    name: run-unit-tests-jdk-21
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up JDK
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          java-version: |
            8
            11
            21
          distribution: "adopt"
      - name: run-unit-tests
        run: ./gradlew test -PtestJdkVersion=21

  run-tests-jdk-24:
    name: run-unit-tests-jdk-24
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up JDK
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          java-version: |
            8
            11
            24
          distribution: "adopt"
      - name: run-unit-tests
        run: ./gradlew test -PtestJdkVersion=24
